apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowfi-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flowfi-api
  template:
    metadata:
      labels:
        app: flowfi-api
    spec:
      containers:
        - name: api
          image: flowfi/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: flowfi-env
            - secretRef:
                name: flowfi-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: flowfi-api
  ports:
    - port: 3000
      targetPort: 3000
